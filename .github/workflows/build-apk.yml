name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libopenjdk-11-dev \
            unzip \
            swig

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer kivy python-for-android cython

      - name: Clone Kivy dependencies
        run: |
          mkdir -p ~/.local/share/kivy
          git clone https://github.com/kivy/kivy.git /tmp/kivy
          git clone https://github.com/kivy/buildozer.git /tmp/buildozer

      - name: Build APK
        run: |
          buildozer apk --debug
        env:
          BUILDZEROTMPDIR: /tmp/buildozer_tmp
          BUILDZEROCACHE: /tmp/buildozer_cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bill-generator-apk
          path: ./*.apk
