name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libopenjdk-17-jdk \
            unzip \
            swig \
            ant \
            zip

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 kivy==2.3.0 python-for-android==2024.6.2 cython

      - name: Initialize Buildozer
        run: |
          buildozer init
        env:
          ANDROIDSDK: /opt/android-sdk
          ANDROIDNDK: /opt/android-ndk
          ANDROIDNDKVER: "r25b"
          ANDROIDAPI: "21"
          ANDROIDAPIFORBUILD: "29"

      - name: Build APK
        run: |
          buildozer apk debug --verbose
        env:
          ANDROIDSDK: /opt/android-sdk
          ANDROIDNDK: /opt/android-ndk
          ANDROIDNDKVER: "r25b"
          ANDROIDAPI: "21"
          ANDROIDAPIFORBUILD: "29"
          BUILDZEROTMPDIR: /tmp/buildozer_tmp
          BUILDZEROCACHE: /tmp/buildozer_cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bill-generator-apk
          path: ./*.apk
          retention-days: 5
