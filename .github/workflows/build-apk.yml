name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libopenjdk-17-jdk \
            unzip \
            swig \
            ant \
            zip \
            curl \
            git

      - name: Download Android SDK
        run: |
          mkdir -p /opt/android-sdk
          cd /opt/android-sdk
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          echo "SDK downloaded"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 kivy==2.3.0 python-for-android==2024.6.2 cython

      - name: Initialize Buildozer
        run: |
          export ANDROIDSDK="/opt/android-sdk"
          export ANDROIDNDK="/opt/android-ndk"
          export ANDROIDNDKVER="r25b"
          export ANDROIDAPI="21"
          export ANDROIDAPIFORBUILD="29"
          export PATH="$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools"
          buildozer init

      - name: Accept Android licenses
        run: |
          export ANDROIDSDK="/opt/android-sdk"
          export PATH="$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools"
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          export ANDROIDSDK="/opt/android-sdk"
          export ANDROIDNDK="/opt/android-ndk"
          export ANDROIDNDKVER="r25b"
          export ANDROIDAPI="21"
          export ANDROIDAPIFORBUILD="29"
          export PATH="$PATH:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools"
          buildozer apk debug --verbose 2>&1
        continue-on-error: true

      - name: Debug build output
        run: |
          echo "=== Checking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la bin/ 2>/dev/null || echo "No bin directory"
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bill-generator-apk
          path: |
            bin/*.apk
            *.apk
          retention-days: 5
          ignore-missing: true
