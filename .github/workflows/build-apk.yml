name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libreadline-dev \
          libsqlite3-dev \
          libgdbm-dev \
          libdb-dev \
          libexpat1-dev \
          liblzma-dev \
          libbz2-dev \
          git \
          zip \
          unzip

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0

    - name: Clone Kivy dependencies
      run: |
        mkdir -p .buildozer
        cd .buildozer
        git clone --depth 1 https://github.com/kivy/python-for-android.git
        cd python-for-android
        git checkout HEAD -- recipes/kivy

    - name: Build APK
      run: |
        buildozer android debug
      working-directory: .
      env:
        BUILDOZER_CACHE_DIR: /tmp/bzcache
        BUILDOZER_WARN_ON_MISSING_LIBS: 1

    - name: Find APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null
        ls -la bin/ 2>/dev/null || echo "No bin directory"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: fileExists('bin/*.apk')
      with:
        name: bill-generator-apk
        path: bin/*.apk
        retention-days: 5