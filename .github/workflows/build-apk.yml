name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libopenjdk-17-jdk \
            unzip \
            swig \
            ant \
            zip \
            curl \
            git \
            wget

      - name: Download Android SDK and NDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          # Download NDK
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O android-ndk.zip
          unzip -q android-ndk.zip

          echo "SDK and NDK downloaded"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 kivy==2.3.0 python-for-android==2024.6.2 cython

      - name: Initialize Buildozer
        run: |
          export ANDROIDSDK="$HOME/android-sdk"
          export ANDROIDNDK="$HOME/android-sdk/android-ndk-r25b"
          export ANDROIDNDKVER="r25b"
          export ANDROIDAPI="21"
          export ANDROIDAPIFORBUILD="29"
          export PATH="$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools"

          buildozer init

      - name: Accept Android licenses
        run: |
          export ANDROIDSDK="$HOME/android-sdk"
          export PATH="$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools"
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          export ANDROIDSDK="$HOME/android-sdk"
          export ANDROIDNDK="$HOME/android-sdk/android-ndk-r25b"
          export ANDROIDNDKVER="r25b"
          export ANDROIDAPI="21"
          export ANDROIDAPIFORBUILD="29"
          export PATH="$PATH:$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools"
          buildozer apk debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bill-generator-apk
          path: bin/*.apk
          retention-days: 5
