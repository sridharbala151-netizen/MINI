name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libdb-dev \
            libexpat1-dev \
            liblzma-dev \
            libbz2-dev \
            git \
            zip \
            unzip \
            openjdk-11-jdk

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --user buildozer==1.5.0

      - name: Build APK
        run: |
          export PATH=$HOME/.local/bin:$PATH
          buildozer android debug
        timeout-minutes: 30

      - name: Create Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -1)
          if [ -f "$APATH" ]; then
            echo "APK found at: $APK_PATH"
            ls -la "$APK_PATH"
          else
            echo "APK not found!"
            ls -la bin/ 2>/dev/null || echo "No bin dir"
          fi